name: Vulnerability Scan and Testbench

on:
  pull_request:
  push:

jobs:
  vulnerability_scan:
    name: Vulnerability Scan
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scan source for Vulnerabilities (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
          repo-checkout: true
          # we need to set a version here until https://github.com/golang/go/issues/70036 is fixed..
          go-version-input: 1.25.12
          go-version-file: go.mod
  run_tests:
    name: Testbench
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Run unit tests
        run: make test
      - name: Build shared object
        run: make build
      - name: Run FTW tests
        run: make ftw
      - name: Run e2e tests
        run: make e2e
