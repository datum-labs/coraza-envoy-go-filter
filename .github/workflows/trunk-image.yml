name: Publish Trunk Image

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Push Trunk Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Derive trunk image tag
        id: meta
        run: ./.github/scripts/trunk-image-tag.sh
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build shared object
        run: make build
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push payload image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/coraza-waf:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BASE_IMAGE=busybox:1.36
