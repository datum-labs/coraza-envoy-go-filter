name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
      - name: Build shared object
        uses: magefile/mage-action@v3
        with:
          version: latest
          args: build
      - name: Run FTW tests
        uses: magefile/mage-action@v3
        with:
          version: latest
          args: ftw
      - name: Run e2e tests
        uses: magefile/mage-action@v3
        with:
          version: latest
          args: e2e
      - name: Generate Release Notes
        id: notes
        uses: theory/changelog-version-notes-action@v0.1.3
        if: ${{ !contains(github.ref_name, '-alpha') }}
      - name: Release Candidate
        uses: softprops/action-gh-release@v2
        if: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha')}}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: true
          files: |
            LICENSE
            coraza-waf.so
      - name: Final Release
        uses: softprops/action-gh-release@v2
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') }}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: false
          files: |
            CHANGELOG.md
            LICENSE
            coraza-waf.so
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push payload image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/coraza-waf:${{ github.ref_name }}
          build-args: |
            BASE_IMAGE=busybox:1.36
