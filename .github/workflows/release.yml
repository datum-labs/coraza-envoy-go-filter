name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build shared object
        run: make build
      - name: Run FTW tests
        run: make ftw
      - name: Run e2e tests
        run: make e2e
      - name: Generate Release Notes
        id: notes
        uses: theory/changelog-version-notes-action@v0.1.3
        if: ${{ !contains(github.ref_name, '-alpha') }}
      - name: Release Candidate
        uses: softprops/action-gh-release@v2
        if: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha')}}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: true
          files: |
            LICENSE
            build/coraza-waf.so
      - name: Final Release
        uses: softprops/action-gh-release@v2
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') }}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: false
          files: |
            CHANGELOG.md
            LICENSE
            build/coraza-waf.so
      - name: Derive image tag and upstream base
        id: meta
        run: ./.github/scripts/derive-image-tag.sh
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push payload image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/coraza-waf:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.base.version=${{ steps.meta.outputs.upstream_base }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BASE_IMAGE=busybox:1.36
